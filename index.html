<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English lessons</title>
</head>
<body>
    <header style="background-color: aquamarine;"><h1 style="text-align: center;">Learn English words</h1></header>
    <main style="display: flex; justify-content: center; gap: 30px">
        <div class="side">
            <img width="268" src="./img1.jpg">
            <img width="211" src="./img2.jpg">
        </div>
        <div class="cards_block">
            <div class="field_for_input">
                <p class="english_word"></p>
            </div>
            <div style="display: flex; justify-content: flex-start">
                <button class="green">I know</button>
                <button class="red">I don't know</button>
            </div>
        </div>
        <div class="side">
            <img width="209" src="./img3.jpg">
            <img width="239" src="./img4.jpg">
        </div>
    </main>
<script src="script.js"></script>
</body>
</html>
